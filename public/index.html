<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul's Truecaller Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f172a; color: #fff; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-card { background: #1e293b; width: 100%; max-width: 450px; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); border: 1px solid #334155; }
        h1 { text-align: center; color: #3b82f6; margin-bottom: 25px; font-size: 24px; font-weight: 800; letter-spacing: 1px; }
        .section { background: #0f172a; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #1e293b; }
        h3 { margin-bottom: 12px; font-size: 15px; color: #94a3b8; }
        input, select { width: 100%; padding: 12px; background: #1e293b; border: 1px solid #475569; border-radius: 8px; color: white; margin-bottom: 12px; font-size: 16px; outline: none; }
        input:focus { border-color: #3b82f6; }
        button { width: 100%; padding: 12px; background: #3b82f6; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #2563eb; }
        .result-box { padding: 15px; border-radius: 10px; display: none; margin-top: 15px; text-align: center; }
        .status-safe { background: rgba(34, 197, 94, 0.2); border: 1px solid #22c55e; color: #4ade80; }
        .status-spam { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #f87171; animation: shake 0.3s ease-in-out; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
    </style>
</head>
<body>

    <div class="app-card">
        <h1>📞 TRUE CALLER CLONE</h1>

        <div class="section">
            <h3>🔍 Search Number Details</h3>
            <input type="number" id="search-num" placeholder="Enter 10 digit number...">
            <button onclick="searchNumber()">Identify Number</button>
            
            <div id="result" class="result-box">
                <h2 id="res-name" style="font-size: 22px;"></h2>
                <p id="res-status" style="margin-top: 5px; font-weight: bold; font-size: 14px;"></p>
            </div>
        </div>

        <div class="section">
            <h3>📥 Register / Report Spammer</h3>
            <input type="number" id="reg-num" placeholder="Phone Number...">
            <input type="text" id="reg-name" placeholder="Name or Tag...">
            <select id="reg-spam">
                <option value="false">Safe / Regular Contact (Green)</option>
                <option value="true">Spam / Fraud Account (Red)</option>
            </select>
            <button style="background: #10b981;" onclick="registerNumber()">Save to Database</button>
        </div>
    </div>

    <script>
        async function searchNumber() {
            const number = document.getElementById('search-num').value;
            const resultBox = document.getElementById('result');
            const resName = document.getElementById('res-name');
            const resStatus = document.getElementById('res-status');

            if(!number) return alert("Pehle number dalo bhai!");

            resName.textContent = "Searching...";
            resultBox.className = "result-box status-safe";
            resultBox.style.display = "block";

            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ number })
                });
                const data = await response.json();

                if (data.success && data.found) {
                    resName.textContent = data.data.name;
                    if(data.data.isSpam === "true" || data.data.isSpam === true) {
                        resultBox.className = "result-box status-spam";
                        resStatus.textContent = "🚨 WARN: REPORTED AS SPAM / FRAUD";
                    } else {
                        resultBox.className = "result-box status-safe";
                        resStatus.textContent = "✓ VERIFIED SAFE USER";
                    }
                } else {
                    resName.textContent = "Unknown Number";
                    resultBox.className = "result-box";
                    resultBox.style.background = "#334155";
                    resStatus.textContent = "Database mein ye record nahi mila.";
                }
            } catch (err) {
                alert("Server error, fir se try karo!");
            }
        }

        async function registerNumber() {
            const number = document.getElementById('reg-num').value;
            const name = document.getElementById('reg-name').value;
            const isSpam = document.getElementById('reg-spam').value === "true";

            if(!number || !name) return alert("Poori details bharo bhai!");

            try {
                const response = await fetch('/api/report', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ number, name, isSpam })
                });
                const data = await response.json();
                alert(data.message);
                
                // Clear input fields
                document.getElementById('reg-num').value = '';
                document.getElementById('reg-name').value = '';
            } catch (err) {
                alert("Save karne mein dikkat aayi.");
            }
        }
    </script>
</body>
</html>
